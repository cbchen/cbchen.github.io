<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Four Fractals</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 30% 20%, rgba(120, 119, 198, 0.18), transparent 32%),
        radial-gradient(circle at 70% 80%, rgba(45, 212, 191, 0.12), transparent 34%),
        #030303;
      color: #f5f5f5;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 650;
      letter-spacing: -0.08em;
      line-height: 0.9;
      text-transform: lowercase;
    }

    .mark {
      margin: 0 auto 2rem;
      width: 84px;
      height: 84px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 14px;
      opacity: 0.9;
    }

    .mark span {
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.18));
    }

    a {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      font-size: 0.9rem;
    }

    a:hover {
      color: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
    <h1>four fractals</h1>
  </main>

  <a href="/privacy.html">Privacy</a>
</body>
</html>
